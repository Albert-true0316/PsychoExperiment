<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI页面设计调查</title>

  <!-- jsPsych 7 (ESM via esm.sh, bridged to globals) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/css/jspsych.css"
        onerror="this.onerror=null;this.href='https://unpkg.com/jspsych@7.3.4/css/jspsych.css';">
  <script type="module">
    import { initJsPsych } from "https://esm.sh/jspsych@7.3.4";
    import htmlButton from "https://esm.sh/@jspsych/plugin-html-button-response@1.1.3";
    import htmlKeyboard from "https://esm.sh/@jspsych/plugin-html-keyboard-response@1.1.3";
    window.initJsPsych = initJsPsych;
    window.jsPsychHtmlButtonResponse = htmlButton;
    window.jsPsychHtmlKeyboardResponse = htmlKeyboard;
    // Load experiment.js only after globals are ready
    const s = document.createElement('script');
    s.src = 'experiment.js';
    document.body.appendChild(s);
  </script>

  <!-- 样式 -->
  <link rel="stylesheet" href="styles/main.css?v=20260329">
</head>
<body>
  <div id="jspsych-content"></div>
</body>
</html>
