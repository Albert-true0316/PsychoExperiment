<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 助手</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="subpage-body chat-container">
  <div class="subpage-header">
    <div class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></div>
    <span class="sp-title">AI 学习助手</span>
    <span class="subpage-badge" id="status-badge">已连接</span>
  </div>

  <div class="subpage-disconnected-banner" id="disconnected-banner">连接已断开，无法继续使用。</div>

  <div class="chat-area" id="chat-area">
    <div class="msg ai">您好！我已存储您本次listA学习的全部内容。您可以问我「我学了什么」，或直接询问某个具体知识点。</div>
  </div>

  <div class="chat-input-area">
    <textarea id="user-input" class="chat-input" rows="1" placeholder="输入消息…"></textarea>
    <button id="send-btn" class="chat-send-btn">发送</button>
  </div>

  <script>
    const STORED = [
      '蜜蜂飞行时，每秒钟拍打翅膀约200次。',
      '成年人的肺部全部展开后，总面积约为70平方米，相当于一个网球场的一半。',
      '月球反射的阳光从月球抵达地球约需1.3秒。',
      '世界上最深的淡水湖贝加尔湖，最大深度约为1642米。',
      '蟑螂在被切除头部后仍可存活约9天，最终因无法饮水而死亡。',
      '人体大约由37万亿个细胞组成。',
      '蜗牛的口腔内约有14000颗细小的牙齿，排列在称为齿舌的器官上。',
      '猫的每只耳朵由32块独立的肌肉控制，因此能精准转动朝向声源。',
      '蓝鲸的心脏重量约为180公斤，每次心跳声在3公里外仍可被探测到。',
      '鸵鸟的眼球直径约为5厘米，比它自己的大脑还要大。',
      '土星的平均密度约为0.69克/立方厘米，比水还轻，理论上可以漂浮在足够大的水面上。',
      '大象的妊娠期约为22个月，是陆地哺乳动物中妊娠期最长的。',
      '金枪鱼的游速最高可达每小时75公里，是海洋中速度最快的鱼类之一。',
      '竹子在生长旺季一天最多可以生长约91厘米，是世界上生长速度最快的植物之一。',
      '地球上现存生物约有870万种（不含细菌等微生物），其中约四分之三尚未被科学记录。',
      '一个普通喷嚏中喷出的气体速度约为每小时160公里。',
      '人类指甲平均每月生长约3.5毫米，趾甲的生长速度约为其一半。',
      '海马每天最多可以吃掉约3000只小型甲壳类动物，因为它们没有胃，消化极快。',
      '雪豹的尾巴几乎与身体等长，长度约为80至105厘米，可在睡眠时缠绕身体保暖。',
      '成年人每天约脱落30000至40000个皮肤细胞，每隔约27天便完成一次皮肤的完全更新。'
    ];

    const KEYWORDS = [
      ['蜜蜂','翅膀','每秒','200次'],
      ['肺部','肺','70平方','网球场'],
      ['月球','1.3秒','月光抵达'],
      ['贝加尔','1642','淡水湖'],
      ['蟑螂','头部','9天','无法饮水'],
      ['细胞','37万亿'],
      ['蜗牛','牙齿','14000','齿舌'],
      ['猫','耳朵','32块','肌肉控制'],
      ['蓝鲸','心脏','180公斤'],
      ['鸵鸟','眼球','5厘米'],
      ['土星','密度','0.69','漂浮'],
      ['大象','妊娠','22个月'],
      ['金枪鱼','75公里','游速'],
      ['竹子','91厘米','生长最快'],
      ['870万','物种','生物种数'],
      ['喷嚏','160公里'],
      ['指甲','3.5毫米','指甲生长'],
      ['海马','3000只','甲壳'],
      ['雪豹','尾巴','80至105'],
      ['皮肤细胞','脱落','27天']
    ];

    /** 主题词扩展：用户用模糊说法提问时，并入与 List A 条目相关的检索词 */
    const TOPIC_RULES = [
      { re: /成年人|成人|人类(?!文明)|人体|身上|皮肤|肺部|肺/, add: ['成年人','成年','肺','肺部','皮肤','细胞','指甲','脱落','喷嚏','人体','37万亿','网球场','30000','40000','27天','3.5毫米','皮肤细胞'] },
      { re: /动物|昆虫|鱼|鸟|猫|蜜蜂|蓝鲸|鸵鸟|蜗牛|大象|蟑螂|海马|金枪鱼|雪豹|哺乳|甲壳/, add: ['蜜蜂','猫','蓝鲸','鸵鸟','大象','蜗牛','蟑螂','金枪鱼','海马','雪豹'] },
      { re: /天文|月球|月亮|土星|星球|太空|宇宙/, add: ['月球','土星','密度','0.69','1.3秒'] },
      { re: /植物|竹子/, add: ['竹子','91厘米','生长'] },
      { re: /贝加尔|淡水湖|最深|湖/, add: ['贝加尔','1642','淡水'] },
      { re: /速度|快|慢|公里|每秒|游速/, add: ['200次','75公里','160公里','1.3秒','游速','每秒'] }
    ];

    const TOP_K = 3;
    const MIN_SCORE_TO_REPLY = 1;
    const RELATIVE_CUTOFF = 0.72;

    // 实体词强命中：命中后优先返回单条，降低“海马->多条弱相关”的穿帮风险
    const ENTITY_HINTS = [
      { i: 0, terms: ['蜜蜂'] },
      { i: 1, terms: ['肺部', '肺', '70平方米', '网球场'] },
      { i: 2, terms: ['月球', '1.3秒'] },
      { i: 3, terms: ['贝加尔', '淡水湖', '1642'] },
      { i: 4, terms: ['蟑螂', '9天'] },
      { i: 5, terms: ['37万亿', '细胞'] },
      { i: 6, terms: ['蜗牛', '齿舌', '14000'] },
      { i: 7, terms: ['猫', '耳朵', '32块'] },
      { i: 8, terms: ['蓝鲸', '180公斤'] },
      { i: 9, terms: ['鸵鸟', '5厘米'] },
      { i: 10, terms: ['土星', '0.69', '密度'] },
      { i: 11, terms: ['大象', '妊娠', '22个月'] },
      { i: 12, terms: ['金枪鱼', '75公里'] },
      { i: 13, terms: ['竹子', '91厘米'] },
      { i: 14, terms: ['870万', '物种'] },
      { i: 15, terms: ['喷嚏', '160公里'] },
      { i: 16, terms: ['指甲', '3.5毫米'] },
      { i: 17, terms: ['海马', '3000只'] },
      { i: 18, terms: ['雪豹', '80至105'] },
      { i: 19, terms: ['皮肤细胞', '30000', '40000', '27天'] }
    ];

    // 主题白名单路由：先限制候选池，再做排序，降低跨类误召回
    const TOPIC_POOLS = [
      { re: /鱼类|和鱼有关|关于鱼|^鱼$/, indices: [12, 17] }, // 金枪鱼、海马
      { re: /昆虫|虫类|节肢|^虫$/, indices: [0, 4] }, // 蜜蜂、蟑螂
      { re: /鸟类|鸟|禽类/, indices: [9] }, // 鸵鸟
      { re: /哺乳|哺乳动物|大型动物|陆地动物/, indices: [7, 8, 11, 18] }, // 猫、蓝鲸、大象、雪豹
      { re: /天文|宇宙|星球|太空|月球|土星/, indices: [2, 10] },
      { re: /人体|人类|成年人|皮肤|肺|细胞|指甲|喷嚏/, indices: [1, 5, 15, 16, 19] }
    ];

    function normalize(s) {
      return String(s).replace(/[\s\u3000]+/g, '').replace(/[，。！？、；：""''（）【】]/g, '');
    }

    function buildSearchBlob(raw) {
      const t = normalize(raw);
      let blob = t;
      for (const { re, add } of TOPIC_RULES) {
        if (re.test(raw)) blob += add.join('');
      }
      return blob;
    }

    function scoreItem(i, searchBlob, rawTrimmed) {
      let score = 0;
      for (const kw of KEYWORDS[i]) {
        if (searchBlob.includes(kw)) score += 2;
      }
      const sent = STORED[i];
      if (rawTrimmed.length >= 2) {
        const n = normalize(rawTrimmed);
        for (let j = 0; j + 2 <= n.length; j++) {
          const bi = n.slice(j, j + 2);
          if (sent.includes(bi)) score += 0.4;
        }
      }
      return score;
    }

    let disconnected = false;
    let lastMatchedIndices = [];

    function setDisconnected() {
      disconnected = true;
      document.getElementById('chat-area').innerHTML = '';
      document.getElementById('disconnected-banner').style.display = 'block';
      const badge = document.getElementById('status-badge');
      badge.textContent = '已断开';
      badge.classList.add('disconnected');
      document.getElementById('user-input').disabled = true;
      document.getElementById('send-btn').disabled = true;
    }

    if (localStorage.getItem('listA_test_started') === '1') {
      setDisconnected();
    }
    window.addEventListener('storage', function(e) {
      if (e.key === 'listA_test_started' && e.newValue === '1') setDisconnected();
    });

    function findResponse(input) {
      const text = input.trim();
      const nText = normalize(text);
      if (/你是谁|什么模型|什么AI|真的AI|假的|能上网|联网|天气|新闻|时间|日期|你叫什么/.test(text)) {
        return '我是本次实验专属的学习助手，仅用于存储和回顾您的listA学习内容，不具备其他功能。';
      }
      if (/学了什么|记录了什么|存了什么|保存了什么|内容是什么|列出|全部|所有/.test(text)) {
        return '以下是我为您存储的全部学习内容：\n\n' +
          STORED.map((s, i) => `${i + 1}. ${s}`).join('\n');
      }
      if (/几条|多少条|多少个|几个/.test(text)) return `我共为您存储了 ${STORED.length} 条学习内容。`;

      // 类别词快速分流：避免宽泛主题把无关条目召回
      for (const pool of TOPIC_POOLS) {
        if (pool.re.test(text)) {
          const picks = pool.indices.slice(0, 2);
          lastMatchedIndices = picks;
          return '根据我存储的内容，相关条目有：\n\n' +
            picks.map((i, idx) => `${idx + 1}. ${STORED[i]}`).join('\n\n');
        }
      }

      // 承接式追问：对“为什么/怎么会”等问题复用上一轮命中条目，减少直接兜底
      if (/为什么|怎么会|怎么|依据|原理|解释一下|展开说说/.test(text) && lastMatchedIndices.length > 0) {
        const idx = lastMatchedIndices[0];
        return `这是基于我已存储内容给出的说明：${STORED[idx]}\n\n如果您想更精确，我可以继续按主题筛选（例如“只说和动物有关的”）。`;
      }

      // 实体词强命中：若命中明确实体，则优先返回单条
      const exactEntityHits = ENTITY_HINTS.filter(e => e.terms.some(t => nText.includes(normalize(t))));
      if (exactEntityHits.length === 1) {
        lastMatchedIndices = [exactEntityHits[0].i];
        return `根据我存储的内容：${STORED[exactEntityHits[0].i]}`;
      }

      const searchBlob = buildSearchBlob(text);
      const ranked = [];
      for (let i = 0; i < STORED.length; i++) {
        const sc = scoreItem(i, searchBlob, text);
        if (sc > 0) ranked.push({ i, sc });
      }
      ranked.sort((a, b) => b.sc - a.sc);
      const bestScore = ranked.length > 0 ? ranked[0].sc : 0;
      const cutoff = Math.max(MIN_SCORE_TO_REPLY, bestScore * RELATIVE_CUTOFF);
      const filtered = ranked.filter(r => r.sc >= cutoff);
      // 动态Top-K：高置信度实体问法返回1条，中等返回2条，否则最多3条
      let dynamicK = TOP_K;
      if (exactEntityHits.length >= 1 || bestScore >= 8) dynamicK = 1;
      else if (bestScore >= 4) dynamicK = 2;
      const picks = filtered.slice(0, dynamicK);

      if (picks.length > 0) {
        lastMatchedIndices = picks.map(p => p.i);
        const lines = picks.map((r, idx) => `${idx + 1}. ${STORED[r.i]}`);
        return '根据您的问题，我在已存储的学习内容中找到以下相关条目：\n\n' + lines.join('\n\n');
      }

      return '我暂时没匹配到足够明确的条目。您可以再具体一点，例如：\n1) 说类别（鱼类/昆虫/人体/天文）\n2) 说关键词（如“海马”“土星”“肺部”）\n也可以直接问我「我学了什么」查看完整列表。';
    }

    function appendMsg(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      document.getElementById('chat-area').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
    }

    function send() {
      if (disconnected) return;
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      appendMsg(text, 'user');
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.textContent = 'AI 正在输入…';
      document.getElementById('chat-area').appendChild(typing);
      typing.scrollIntoView({ behavior: 'smooth' });
      setTimeout(() => {
        typing.remove();
        appendMsg(findResponse(text), 'ai');
      }, 600 + Math.random() * 600);
    }

    document.getElementById('send-btn').addEventListener('click', send);
    document.getElementById('user-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
